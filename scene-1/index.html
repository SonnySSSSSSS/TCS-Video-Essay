<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TCS Scene 1 - Eyes to Rivers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="smooth-wrapper">
    <div id="smooth-content">
  <main class="scene-1-shell">
    <section class="stage" aria-label="TCS eyes becoming rivers">
      <svg id="sceneSvg" viewBox="0 0 390 844" role="img" aria-label="Eyes, tears, and rivers in painterly style">
        <defs>
          <!-- brushstroke: displacement filter whose seed is cycled by JS
               on each 12fps tick to create the "boiling" hand-drawn look -->
          <filter id="brushstroke" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.020" numOctaves="3" seed="9" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
          </filter>
          <!-- paintTexture: visible grain for aged-paper / lacquer-canvas quality -->
          <filter id="paintTexture" x="-10%" y="-10%" width="120%" height="120%">
            <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="4" result="grain" />
            <feColorMatrix in="grain" type="saturate" values="0" result="grayGrain" />
            <feComposite in="grayGrain" in2="SourceGraphic" operator="in" result="maskedGrain" />
            <feBlend in="SourceGraphic" in2="maskedGrain" mode="multiply" />
          </filter>
          <!-- tearFlow: gentle low-scale displacement — sad flowing lines, not chaos -->
          <filter id="tearFlow" x="-10%" y="-5%" width="120%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="9" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
          </filter>
          <radialGradient id="poolInk" cx="50%" cy="45%" r="65%">
            <stop offset="0%" stop-color="#1a1a1a" />
            <stop offset="100%" stop-color="#0d0d0d" />
          </radialGradient>
          <!-- Warm aged-paper vignette over the whole canvas (TCS lacquer/oil style) -->
          <radialGradient id="warmVignette" cx="50%" cy="50%" r="72%">
            <stop offset="0%" stop-color="#f5ead0" stop-opacity="0" />
            <stop offset="70%" stop-color="#d4a96a" stop-opacity="0.07" />
            <stop offset="100%" stop-color="#8c5e2a" stop-opacity="0.18" />
          </radialGradient>
        </defs>

        <rect x="0" y="0" width="390" height="844" class="canvas" />

        <g id="eyeSystem" filter="url(#brushstroke)">
          <!-- Eyebrows: natural, expressive arch above frames -->
          <g id="brows" stroke="#2c2416" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M 72 228 Q 120 213 168 222" />
            <path d="M 220 222 Q 268 213 316 228" />
          </g>

          <!-- Frames: TCS's iconic round glasses — circular lenses as seen
               in his own sketched self-portrait, large and intellectually warm -->
          <g id="frames" stroke="#2c2416" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="120" cy="285" r="52" />
            <circle cx="268" cy="285" r="52" />
            <!-- bridge: short arc connecting the two circles -->
            <path d="M 172 278 Q 194 268 216 278" />
            <!-- temples: attach at upper-outer edge of each circle -->
            <path d="M 71 267 Q 36 262 30 278" />
            <path d="M 317 267 Q 352 262 358 278" />
          </g>

          <g id="eyes" filter="url(#paintTexture)">
            <!-- Simple dark ink marks — no whites, no colour, just the sketch-like
                 suggestion of an eye behind large round frames -->
            <ellipse id="leftIris" cx="120" cy="289" rx="13" ry="10" class="iris" />
            <ellipse id="rightIris" cx="268" cy="289" rx="13" ry="10" class="iris" />
            <!-- Pupils: merged into the iris mark, just a slightly darker centre -->
            <circle id="leftPupil" cx="120" cy="289" r="6" class="pupil" />
            <circle id="rightPupil" cx="268" cy="289" r="6" class="pupil" />
          </g>

          <!-- Upper lids: slightly heavy, contemplative — TCS's thoughtful gaze -->
          <g id="lids" stroke="#2c2416" stroke-width="3.5" fill="none" stroke-linecap="round">
            <path d="M 86 290 Q 120 268 154 290" />
            <path d="M 234 290 Q 268 268 302 290" />
          </g>
          <!-- Lower lids: subtle crease — suggests depth, weariness, tenderness -->
          <g id="lowerLids" stroke="#2c2416" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4">
            <path d="M 90 296 Q 120 308 150 296" />
            <path d="M 238 296 Q 268 308 298 296" />
          </g>
        </g>

        <g id="tearLayer" stroke="#1a1a1a" stroke-width="3.2" fill="none" stroke-linecap="round" filter="url(#tearFlow)">
          <!-- Short outer tears — fall straight down, gently -->
          <path class="tear" d="M 118 321 Q 112 360 122 412 Q 132 465 126 518" />
          <path class="tear" d="M 128 322 Q 138 358 134 412 Q 129 472 140 530" />
          <path class="tear" d="M 112 321 Q 106 374 110 426 Q 116 474 120 536" />
          <path class="tear" d="M 262 322 Q 252 366 258 418 Q 265 470 252 528" />
          <path class="tear" d="M 272 322 Q 280 356 277 413 Q 270 472 284 534" />
          <path class="tear" d="M 258 321 Q 246 370 244 425 Q 246 482 238 540" />
          <!-- Long inner tears — converge toward pool at y≈505 -->
          <path class="tear" d="M 120 321 Q 168 382 182 455 Q 190 484 190 504" />
          <path class="tear" d="M 270 321 Q 218 384 206 460 Q 200 488 200 505" />
          <path class="tear" d="M 124 321 Q 146 394 168 460 Q 182 483 188 502" />
          <path class="tear" d="M 266 321 Q 242 392 222 460 Q 208 484 204 502" />
        </g>

        <g id="poolPositionGroup" transform="translate(195 510)">
          <g id="poolScaleGroup">
            <path
              id="poolShape"
              d="M -90 0 C -74 -35 -26 -50 0 -44 C 29 -48 72 -33 90 0 C 76 34 36 48 0 44 C -32 47 -75 35 -90 0 Z"
              fill="url(#poolInk)"
              stroke="#0d0d0d"
              stroke-width="3"
              filter="url(#brushstroke)"
            />
            <ellipse cx="0" cy="0" rx="62" ry="19" class="ripple ripple-a" />
            <ellipse cx="0" cy="0" rx="43" ry="12" class="ripple ripple-b" />
          </g>
        </g>

        <g id="riverLayer" stroke="#0d0d0d" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#brushstroke)">
          <path class="river" d="M 172 558 C 154 638 136 732 120 844" />
          <path class="river" d="M 192 562 C 188 642 184 736 180 844" />
          <path class="river" d="M 214 561 C 228 640 246 734 260 844" />
          <path class="river" d="M 154 568 C 128 648 100 740 84 844" />
          <path class="river" d="M 238 570 C 264 648 292 740 316 844" />
        </g>

        <!-- Song title labels — one per river, rotated vertical to flow alongside it.
             Positions are at the mid-body of each river (~y 690).
             Order matches DOM order of .river paths above. -->
        <g id="riverLabels"
           font-family="'Cormorant Garamond', Georgia, serif"
           font-size="9"
           font-style="italic"
           fill="#2c2416"
           text-anchor="middle"
           filter="url(#brushstroke)">
          <!-- River 0 (M 172→120): Diễm Xưa -->
          <text class="river-label" opacity="0"
                transform="rotate(-90, 130, 690)" x="130" y="694">Diễm Xưa</text>
          <!-- River 1 (M 192→180): Như Cánh Vạc Bay -->
          <text class="river-label" opacity="0"
                transform="rotate(-90, 183, 690)" x="183" y="694">Như Cánh Vạc Bay</text>
          <!-- River 2 (M 214→260): Biển Nhớ -->
          <text class="river-label" opacity="0"
                transform="rotate(-90, 248, 690)" x="248" y="694">Biển Nhớ</text>
          <!-- River 3 (M 154→84): Nối Vòng Tay Lớn -->
          <text class="river-label" opacity="0"
                transform="rotate(-90, 96, 690)" x="96" y="694">Nối Vòng Tay Lớn</text>
          <!-- River 4 (M 238→316): Một Cõi Đi Về -->
          <text class="river-label" opacity="0"
                transform="rotate(-90, 301, 690)" x="301" y="694">Một Cõi Đi Về</text>
        </g>

        <!-- Warm aged-paper vignette — sits above all art, pointer-events off -->
        <rect x="0" y="0" width="390" height="844" fill="url(#warmVignette)" class="vignette-overlay" />
      </svg>

      <!-- Scrollytelling chapter narrations (opacity driven by GSAP scroll timeline) -->
      <div class="s1-narr" id="s1-narr-grief">
        His grief<br>became something else.
      </div>
      <div class="s1-narr" id="s1-narr-rivers">
        It became rivers.
      </div>
      <div class="s1-narr" id="s1-narr-source">
        Five rivers.<br><em>One source.</em>
      </div>

      <div class="caption-block">
        <p class="caption-title">Scene 1</p>
        <p class="caption-copy">His tears become rivers. Love and death flow from the same source.</p>
      </div>
    </section>
  </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/MorphSVGPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/DrawSVGPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
  <script src="https://unpkg.com/rough-notation/lib/rough-notation.iife.js"></script>
  <script src="animations.js"></script>
</body>
</html>
