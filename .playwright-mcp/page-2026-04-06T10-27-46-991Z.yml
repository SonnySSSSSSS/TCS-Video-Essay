            - paragraph: Sài Gòn, 1967
            - blockquote:
              - paragraph:
                - text: Đất nước tôi thon thả giọt đàn bầu
                - text: Nghe buồn buồn vọng nước non xa...
              - paragraph:
                - emphasis: "\"My country, slender as a monochord's drop / Hearing the sad echo from the distant land...\""
            - paragraph: As the American War intensified, TCS saw Vietnam as a body being unmade. Cities were destroyed, rebuilt, destroyed again. He experienced impermanence not as philosophy but as the daily fact of a country that refused to hold its shape.
