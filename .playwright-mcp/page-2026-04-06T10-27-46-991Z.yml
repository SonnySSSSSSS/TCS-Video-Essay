                - emphasis: "\"Joining hands wide / We walk from barren fields through emptied marshlands...\""
            - paragraph: Written during the Tet Offensive when the war had reached every doorstep. TCS turned the romantic "join hands" into a call for an entire nation. Love could no longer be private — it had to be as wide as the country's suffering.
