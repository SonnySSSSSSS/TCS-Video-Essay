            - heading "Hát Cho Một Người Nằm Xuống Song for Someone Lying Down" [level=2]:
              - text: Hát Cho Một Người Nằm Xuống
              - generic: Song for Someone Lying Down
            - paragraph: Sài Gòn, 1968
            - blockquote:
              - paragraph:
                - text: Anh nằm xuống sau một lần đã đến đây
                - text: Đến đây rồi anh sẽ không bao giờ đi nữa...
              - paragraph:
                - emphasis: "\"You lie down after having come here once / Come here and you will never leave again...\""
            - paragraph: Written for a young soldier killed in 1968, the song refuses anger. TCS sings to the dead not with grief but with a kind of tender acceptance — as if death were simply the final room in a house we all must eventually enter. The tiger is not the enemy. It was always part of the journey.
