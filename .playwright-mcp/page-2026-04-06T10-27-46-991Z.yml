            - paragraph: Sài Gòn, 1973
            - blockquote:
              - paragraph:
                - text: Mẹ ngồi ru con, tiếng hát ầu ơ
                - text: Tiếng hát ngàn năm còn mãi xanh tươi...
              - paragraph:
                - emphasis: "\"Mother sits rocking her child, lullaby ầu ơ / A song of a thousand years, still forever green...\""
            - paragraph: By the early 1970s TCS had arrived at something like peace with death. In this late song, the dying is held inside a lullaby. Mother, child, earth, and song are one continuous cycle. We die back into the voice that first named us. Death is not ending — it is return.
