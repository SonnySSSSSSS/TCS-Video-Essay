            - heading "Gia Tài Của Mẹ Mother's Legacy" [level=2]:
              - text: Gia Tài Của Mẹ
              - generic: Mother's Legacy
            - paragraph: Sài Gòn, 1965
            - blockquote:
              - paragraph:
                - text: Một ngàn năm đô hộ giặc Tầu
                - text: Một trăm năm đô hộ giặc Tây
                - text: Hai mươi năm nội chiến từng ngày...
              - paragraph:
                - emphasis: "\"A thousand years under Chinese occupation / A hundred years under French occupation / Twenty years of civil war, every day...\""
            - paragraph: Banned by both sides during the war. TCS catalogued Vietnam's dead with the patience of a coroner — not to accuse, not to glorify, but to bear witness. The mother's legacy is a history of other people's dying. He made it impossible to look away.
        - generic:
          - img
        - article:
