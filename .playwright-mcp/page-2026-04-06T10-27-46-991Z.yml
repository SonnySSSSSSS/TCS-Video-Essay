            - heading "Như Cánh Vạc Bay Like a Stork Flying" [level=2]:
              - text: Như Cánh Vạc Bay
              - generic: Like a Stork Flying
            - paragraph: Huế, 1961
            - blockquote:
              - paragraph:
                - text: Như cánh vạc bay, lặng lẽ vào đời
                - text: Như làn mây trôi, thấp thoáng mái đầu...
              - paragraph:
                - emphasis: "\"Like a stork flying, quietly entering life / Like a drifting cloud, glimpsed above a rooftop...\""
            - paragraph: Among his earliest songs, written while still a student in Huế. Even then, he sensed that everything he loved was already in the process of leaving — not tragically, but naturally, like a bird that was never meant to land.
