            - paragraph: Huế, 1960
            - blockquote:
              - paragraph:
                - text: Mưa vẫn hay mưa trên hàng lá nhỏ
                - text: Buổi chiều ngồi ngóng những chuyến mưa qua...
              - paragraph:
                - emphasis: "\"The rain still finds the small leaves to fall on / An afternoon sitting, watching the rains pass...\""
            - paragraph: "Written for a young woman he watched from across a courtyard in Huế — he never spoke to her. She became the prototype for all his idealized loves: beautiful, unreachable, dissolving in rain. This song was his first sight of the strawberry."
